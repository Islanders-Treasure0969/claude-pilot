name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm test

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - name: Check for install scripts in dependencies
        run: |
          node -e "
          const fs = require('fs');
          const dirs = fs.readdirSync('node_modules', {withFileTypes: true}).filter(d => d.isDirectory());
          const risky = [];
          for (const d of dirs) {
            try {
              const pkg = JSON.parse(fs.readFileSync('node_modules/' + d.name + '/package.json'));
              const scripts = pkg.scripts || {};
              if (scripts.preinstall || scripts.install || scripts.postinstall) {
                risky.push({name: d.name, scripts: Object.keys(scripts).filter(k => ['preinstall','install','postinstall'].includes(k))});
              }
            } catch {}
          }
          if (risky.length > 0) {
            console.error('WARNING: Dependencies with install scripts:', JSON.stringify(risky, null, 2));
            process.exit(1);
          }
          console.log('OK: No dependencies have install scripts');
          "

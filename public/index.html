<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Pilot</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hd" style="position:relative">
  <div class="dot" id="beacon"></div>
  <span class="t">Claude Pilot</span>
  <span class="proj" id="proj"></span>
  <button class="gb-toggle" id="gb-toggle" onclick="toggleGlobal()">Actions</button>
  <button class="mode-toggle" id="mode-toggle" onclick="toggleMode()">Exploit</button>
  <span class="agent-badge" id="agent-badge">RUNNING</span>
  <span class="team-running" id="team-badge">TEAM</span>
  <div class="prd-sel">
    <span class="prd-id" id="prd-id"></span>
    <select id="prd-select" onchange="selectPrd(this.value)">
      <option value="">-- PRD --</option>
    </select>
    <span class="prd-progress" id="prd-progress"></span>
    <button class="refresh-btn" onclick="refreshPrd()" title="Refresh phase status">R</button>
  </div>
  <button class="cfg-toggle" id="cfg-toggle" onclick="toggleConfig()">Config</button>
  <div class="gb-panel" id="global-panel">
    <div class="gb-grid" id="global-grid"></div>
  </div>
  <div class="cfg-panel" id="cfg-panel"></div>
</div>

<!-- Command Palette -->
<div class="palette-overlay" id="palette-overlay" onclick="if(event.target===this)closePalette()">
  <div class="palette">
    <input id="palette-input" placeholder="Search skills... (Ctrl+K)" autocomplete="off">
    <div class="palette-list" id="palette-list"></div>
  </div>
</div>

<div class="pl"><div class="plr" id="pipeline"></div></div>

<div class="sp" id="sp">
  <div class="sp-h">
    <span class="sl" id="sp-l"></span>
    <span class="sd" id="sp-d"></span>
    <button class="x" onclick="closeSp()">x</button>
  </div>
  <div class="sk-row" id="sp-sk"></div>
  <ul class="tips" id="sp-tp"></ul>
</div>

<div class="main-split">
  <div class="lg">
    <div class="lg-h">
      <span>Events</span>
      <button class="filter-btn active" id="filter-all" onclick="setEventFilter('all')">All</button>
      <button class="filter-btn" id="filter-session" onclick="setEventFilter('session')">This Session</button>
      <button class="filter-btn" id="filter-pilot" onclick="setEventFilter('pilot')">Pilot Only</button>
      <span class="c" id="lc">0</span>
    </div>
    <div class="lg-s" id="ls"></div>
  </div>
  <div class="out" id="out"></div>
</div>

<div class="autopilot-bar" id="autopilot-bar">
  <span class="ap-label">Autopilot</span>
  <span class="ap-status" id="ap-status">Ready</span>
  <button class="ap-btn" id="ap-start" onclick="startAutopilot()">Start</button>
  <button class="ap-btn" id="ap-pause" onclick="pauseAutopilot()" style="display:none">Pause</button>
  <button class="ap-btn danger" id="ap-stop" onclick="stopAutopilot()" style="display:none">Stop</button>
</div>

<div class="sug" id="sug-bar"></div>

<!-- Prompt Save Dialog -->
<div class="prompt-dialog" id="prompt-dialog">
  <div class="prompt-form">
    <div style="font-size:12px;font-weight:600;color:var(--txb);margin-bottom:10px">Save Prompt</div>
    <input id="prompt-name" placeholder="Prompt name">
    <input id="prompt-desc" placeholder="Description (optional)">
    <textarea id="prompt-text" placeholder="Prompt text"></textarea>
    <input id="prompt-tags" placeholder="Tags (comma separated)">
    <div class="pf-actions">
      <button class="ap-btn" onclick="closePromptDialog()">Cancel</button>
      <button class="cfg-action" onclick="savePrompt()">Save</button>
    </div>
  </div>
</div>

<div class="cmd">
  <div class="cmd-w">
    <input class="cmd-i" id="cmd-i" type="text"
           placeholder="command or prompt... (Enter)" autocomplete="off">
  </div>
  <button class="cmd-b" id="cmd-b" onclick="runCommand()">Run</button>
  <button class="ap-btn" onclick="openPromptDialog(document.getElementById('cmd-i').value)" title="Save as prompt">Save</button>
</div>

<div class="cb">
  <span class="lbl">Step</span>
  <div id="cbtns"></div>
</div>

<script>
function dbg(msg,data){fetch('/api/debug',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({msg,data:data||null,ts:Date.now()})}).catch(()=>{})}
window.onerror=function(msg,src,line){dbg('JS_ERROR',{msg,src,line})};
dbg('script_loaded');
let W={steps:[]},selStep=null,sts={},gts={},ec=0,agentBusy=false,activePrd=null,prevStsKey='',lastGlobalKey='';
let cmuxMode=false,substepSts={},currentSuggestions=[];

function postJson(url,data){return fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})}

function renderUI(){renderGlobal();renderPipe();renderCtrl();renderSuggestions();updateAutopilotUI(autopilotState)}
let autopilotState={running:false,paused:false};

function createSkillChip(skill,cssClass){
  const el=document.createElement('div');
  el.className=cssClass;
  const badge=skill.type==='prompt'?'prompt':'bash';
  const shortName=skill.name.replace(/^\/|^use subagent /,'');
  el.innerHTML=`<span class="badge">${badge}</span><span class="sk-name">${h(shortName)}</span>${skill.desc?`<span class="sk-desc">${h(skill.desc.slice(0,50))}</span>`:''}`;
  el.onclick=(e)=>showSkillDetail(skill,e,false);
  attachSkillHover(el,skill);
  return el;
}

let globalPanelOpen=false;
let currentMode='exploitation';
let recommendations=null;

async function toggleMode(){
  currentMode=currentMode==='exploitation'?'exploration':'exploitation';
  const btn=document.getElementById('mode-toggle');
  btn.textContent=currentMode==='exploitation'?'Exploit':'Explore';
  btn.classList.toggle('explore-mode',currentMode==='exploration');
  if(currentMode==='exploration') trackUsage('explore_mode');
  if(!recommendations) await loadRecommendations();
  renderGlobal();
}
function trackUsage(feature){fetch('/api/debug',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({msg:'usage',data:{feature}})}).catch(()=>{})}

async function loadRecommendations(){
  try{recommendations=await(await fetch('/api/recommendations')).json()}catch{recommendations=null}
}

let decisionTree=null;
let dtPath=[];

async function loadDecisionTree(){
  try{decisionTree=await(await fetch('/api/decision-tree')).json()}catch{decisionTree=null}
}

function renderDecisionTree(container){
  if(!decisionTree)return;
  const wrap=document.createElement('div');wrap.className='dt-wrap';

  // Navigate to current node
  let node=decisionTree;
  for(const idx of dtPath){
    if(node.options&&node.options[idx]&&node.options[idx].next) node=node.options[idx].next;
    else break;
  }

  const q=document.createElement('div');q.className='dt-question';q.textContent=node.question||'';
  wrap.appendChild(q);

  if(node.options){
    node.options.forEach((opt,i)=>{
      const btn=document.createElement('button');btn.className='dt-option';
      btn.textContent=opt.label;
      btn.onclick=()=>{
        if(opt.next){
          dtPath.push(i);
          renderGlobal();
        }else if(opt.action){
          handleDtAction(opt.action);
        }
      };
      wrap.appendChild(btn);
    });
  }

  if(dtPath.length>0){
    const back=document.createElement('button');back.className='dt-back';back.textContent='← 戻る';
    back.onclick=()=>{dtPath.pop();renderGlobal()};
    wrap.appendChild(back);
  }

  container.appendChild(wrap);
}

async function handleDtAction(action){
  fetch('/api/debug',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({msg:'dt-action',data:{type:action.type,name:action.name||''}})}).catch(()=>{});
  if(action.type==='skill'){
    document.getElementById('cmd-i').value=action.prompt||action.name;
    appendOutput('> '+action.name+'\n','tool');
    // Small delay to allow Claude Code's plugin system to settle
    await new Promise(r=>setTimeout(r,500));
    runCommand();
  }else if(action.type==='mode'){
    currentMode=action.value==='exploration'?'exploration':'exploitation';
    document.getElementById('mode-toggle').textContent=currentMode==='exploitation'?'Exploit':'Explore';
    renderGlobal();
  }else if(action.type==='autopilot'){
    startAutopilot();
  }else if(action.type==='navigate'&&action.target==='analytics'){
    toggleGlobal();toggleConfig();
  }
  dtPath=[];
}

function renderGlobal(){
  const grid=document.getElementById('global-grid');
  const toggle=document.getElementById('gb-toggle');
  grid.innerHTML='';
  dbg('renderGlobal',{hasRec:!!recommendations,mode:currentMode,exploreCount:recommendations?.explore?.length||0});
  if(!recommendations){
    const g=W.global;
    if(!g||!(g.skills||[]).length){toggle.style.display='none';return}
    toggle.style.display='';
    toggle.textContent='Actions ('+(g.skills||[]).length+')';
    (g.skills||[]).forEach(s=>grid.appendChild(createSkillChip(s,'gsk')));
    return;
  }
  toggle.style.display='';
  const rec=recommendations;
  if(rec.health&&rec.health.length>0){
    rec.health.forEach(hi=>{
      const el=document.createElement('div');
      el.className='gb-health';
      el.textContent=(hi.type==='warn'?'! ':'i ')+hi.msg;
      if(hi.action){el.style.cursor='pointer';el.onclick=()=>sendSkill(hi.action)}
      grid.appendChild(el);
    });
  }
  if(currentMode==='exploitation'){
    if(rec.recommended.length>0){
      const lbl=document.createElement('span');lbl.className='gb-cat';
      lbl.textContent=rec.phaseLabel?rec.phaseLabel+' — Recommended':'Recommended';
      grid.appendChild(lbl);
      rec.recommended.forEach(s=>{
        const chip=createSkillChip(s,'gsk recommended');
        if(s.reason){const r=document.createElement('span');r.className='sk-reason';r.textContent=s.reason;chip.appendChild(r)}
        grid.appendChild(chip);
      });
    }
    const teams=W.teams||[];
    if(teams.length>0){
      const lbl=document.createElement('span');lbl.className='gb-cat';lbl.textContent='Teams';grid.appendChild(lbl);
      teams.forEach(t=>{
        const el=document.createElement('span');el.className='team-chip';
        el.textContent=(t.mode||'seq')+' '+t.label;el.title=t.desc||'';
        el.onclick=()=>runTeam(t.id,t.label,t.desc);grid.appendChild(el);
      });
      const addBtn=document.createElement('button');addBtn.className='team-add';addBtn.textContent='+ New Team';
      addBtn.onclick=createTeamDialog;grid.appendChild(addBtn);
    }
    if(rec.other.length>0){
      const hdr=document.createElement('div');hdr.className='gb-cat';hdr.style.cursor='pointer';
      hdr.textContent='▶ All Skills ('+rec.other.length+')';
      const inner=document.createElement('div');inner.style.marginTop='6px';inner.style.display='none';
      hdr.onclick=()=>{
        const open=inner.style.display!=='none';
        inner.style.display=open?'none':'block';
        hdr.textContent=(open?'▶':'▼')+' All Skills ('+rec.other.length+')';
      };
      // Group by category from workflow.yml
      const cats=W.global?.categories||[];
      const otherNames=new Set(rec.other.map(s=>s.name));
      const shown=new Set();
      cats.forEach(cat=>{
        const catSkills=rec.other.filter(s=>(cat.skills||[]).some(cs=>cs.name===s.name)&&!shown.has(s.name));
        if(catSkills.length===0)return;
        const catLbl=document.createElement('div');catLbl.className='gb-subcat';catLbl.textContent=cat.name;inner.appendChild(catLbl);
        const catGrid=document.createElement('div');catGrid.className='gb-grid';
        catSkills.forEach(s=>{shown.add(s.name);catGrid.appendChild(createSkillChip(s,'gsk dimmed'))});
        inner.appendChild(catGrid);
      });
      // Uncategorized
      const uncategorized=rec.other.filter(s=>!shown.has(s.name));
      if(uncategorized.length>0){
        const catLbl=document.createElement('div');catLbl.className='gb-subcat';catLbl.textContent='Other';inner.appendChild(catLbl);
        const catGrid=document.createElement('div');catGrid.className='gb-grid';
        uncategorized.forEach(s=>catGrid.appendChild(createSkillChip(s,'gsk dimmed')));
        inner.appendChild(catGrid);
      }
      grid.appendChild(hdr);
      grid.appendChild(inner);
    }
  }else{
    // EXPLORATION MODE: Context-aware decision tree + tools
    renderDecisionTree(grid);

    const lbl=document.createElement('span');lbl.className='gb-cat';lbl.textContent='Tools';grid.appendChild(lbl);
    rec.explore.forEach(s=>grid.appendChild(createSkillChip(s,'gsk explore')));
  }
  const count=currentMode==='exploitation'?rec.recommended.length+rec.other.length:rec.explore.length;
  toggle.textContent='Actions ('+count+')';
}

function renderSuggestions(){
  const bar=document.getElementById('sug-bar');
  let suggestions=currentSuggestions||[];
  if(!activePrd&&(!suggestions||suggestions.length===0)){
    suggestions=(W.defaults&&W.defaults.suggestions)||[];
  }
  if(suggestions.length===0){bar.classList.remove('show');return}
  bar.classList.add('show');
  bar.innerHTML='<span class="sug-l">Next</span>';
  suggestions.slice(0,3).forEach(s=>{
    const el=document.createElement('span');
    const isAction=s.type==='prompt'||s.type==='bash'||s.selfContained;
    el.className='sug-chip'+(isAction?' action':' info');
    el.textContent=s.name;
    el.title=(s.reason?s.reason+' — ':'')+( s.desc||'');
    if(isAction){
      el.style.cursor='pointer';
      el.onclick=()=>{
        document.getElementById('cmd-i').value=s.prompt||s.name;
        if(s.selfContained)runCommand();
        else document.getElementById('cmd-i').focus();
      };
    }
    bar.appendChild(el);
  });
}

function toggleGlobal(){
  globalPanelOpen=!globalPanelOpen;
  document.getElementById('global-panel').classList.toggle('open',globalPanelOpen);
  document.getElementById('gb-toggle').classList.toggle('open',globalPanelOpen);
}

/* Skill detail popover */
let activePopover=null;
let hoverTimer=null;

function showSkillDetail(skill,eventOrEl,isHover){
  closeSkillDetail();
  const target=eventOrEl instanceof HTMLElement?eventOrEl:(eventOrEl.currentTarget||eventOrEl.target);
  if(!target)return;
  const rect=target.getBoundingClientRect();
  const pop=document.createElement('div');
  pop.className='sk-detail';
  // Skills that can run without arguments: check skill.selfContained flag or fallback pattern
  const selfContained=skill.selfContained||/^\/simplify$|^\/hookify:hookify$/i.test(skill.name);
  pop.innerHTML=`
    <div class="sk-name">${h(skill.name)}</div>
    <div class="sk-desc">${h(skill.desc||'No description')}</div>
    <div class="sk-type">${skill.type==='prompt'?'Claude prompt':'Shell command'}</div>
    <div class="sk-actions">
      ${selfContained?`<button class="sk-run">${cmuxMode?'Send to Terminal':'Run'}</button>`:''}
      <button class="sk-fill">${selfContained?'Edit &amp; Send':'Use (edit before sending)'}</button>
    </div>`;
  document.body.appendChild(pop);
  let top=rect.bottom+4;
  let left=Math.min(rect.left,window.innerWidth-pop.offsetWidth-10);
  if(top+pop.offsetHeight>window.innerHeight)top=rect.top-pop.offsetHeight-4;
  pop.style.top=top+'px';
  pop.style.left=Math.max(4,left)+'px';
  activePopover=pop;
  const runBtn=pop.querySelector('.sk-run');
  if(runBtn){
    runBtn.onclick=(e)=>{
      e.stopPropagation();
      dbg('sk-run clicked',{skill:skill.name});
      closeSkillDetail();
      // Use prompt field if available (e.g. exploration tools with full prompt templates)
      document.getElementById('cmd-i').value=skill.prompt||skill.name;
      runCommand();
    };
  }
  pop.querySelector('.sk-fill').onclick=(e)=>{
    e.stopPropagation();
    closeSkillDetail();
    const input=document.getElementById('cmd-i');
    input.value=skill.name+' ';
    input.focus();
    input.placeholder=skill.desc?`${skill.name} <${skill.desc.slice(0,30)}...>`:'Add context and press Enter';
  };
  pop.onmouseenter=()=>{if(hoverTimer)clearTimeout(hoverTimer)};
  pop.onmouseleave=()=>{hoverTimer=setTimeout(closeSkillDetail,300)};
  if(!isHover){
    setTimeout(()=>document.addEventListener('click',onClickOutsidePopover,{once:true}),0);
  }
}

function attachSkillHover(el,skill){
  el.onmouseenter=()=>{
    if(hoverTimer)clearTimeout(hoverTimer);
    hoverTimer=setTimeout(()=>showSkillDetail(skill,el,true),400);
  };
  el.onmouseleave=()=>{
    if(hoverTimer){clearTimeout(hoverTimer);hoverTimer=null}
    hoverTimer=setTimeout(closeSkillDetail,300);
  };
}

function onClickOutsidePopover(e){
  if(activePopover&&!activePopover.contains(e.target))closeSkillDetail();
}
function closeSkillDetail(){
  if(activePopover){activePopover.remove();activePopover=null}
}

async function init(){
  W=await(await fetch('/api/workflow')).json();
  document.getElementById('proj').textContent=W.projectName||'';
  // Detect cmux mode
  try{
    const ctx=await(await fetch('/api/cmux-context')).json();
    cmuxMode=ctx.available||false;
    dbg('cmux-context',{available:ctx.available,surface:ctx.defaultSurface,cmuxMode});
  }catch(e){cmuxMode=false;dbg('cmux-context-error',{error:e.message})}
  updateCmuxUI();
  await Promise.all([loadRecommendations(), loadDecisionTree()]);
  renderUI();
  await loadPrds();
  connectSSE();
}

function updateCmuxUI(){
  const btn=document.getElementById('cmd-b');
  const input=document.getElementById('cmd-i');
  if(cmuxMode){
    btn.textContent='Send';
    input.placeholder='command or prompt... (Enter to send to terminal)';
  }else{
    btn.textContent='Run';
    input.placeholder='command or prompt... (Enter)';
  }
}

/* PRD selector */
async function loadPrds(){
  try{
    const data=await(await fetch('/api/prds')).json();
    const sel=document.getElementById('prd-select');
    sel.innerHTML='<option value="">-- PRD --</option>';
    (data.prds||[]).forEach(p=>{
      const opt=document.createElement('option');
      opt.value=p.id;
      opt.textContent=`${p.id} (${p.done}/${p.total})`;
      sel.appendChild(opt);
    });
    if(data.activePrdId){
      sel.value=data.activePrdId;
      activePrd=data.activePrdId;
      const prd=(data.prds||[]).find(p=>p.id===data.activePrdId);
      if(prd){
        sts=prd.statuses;
        gts=prd.gates||{};
        if(prd.suggestions)currentSuggestions=prd.suggestions;
        if(prd.substepStatuses)substepSts=prd.substepStatuses;
        updatePrdDisplay(prd);
        renderUI();
        if(prd.currentPhase)openSp(prd.currentPhase);
      }
    }
  }catch(e){console.error('loadPrds:',e)}
}

async function selectPrd(prdId){
  try{
    const res=await postJson('/api/prd/select',{prdId:prdId||null});
    if(!res.ok)console.error('selectPrd failed:',res.status);
  }catch(e){console.error('selectPrd:',e);return}
  activePrd=prdId||null;
  await loadRecommendations();
  renderGlobal();
  if(!prdId){
    sts={};gts={};
    (W.steps||[]).forEach(s=>{sts[s.id]='pending'});
    updatePrdDisplay(null);
    renderUI();closeSp();
  }
}

async function refreshPrd(){
  if(!activePrd)return;
  try{
    const data=await(await postJson('/api/prd/refresh',{})).json();
    if(data.statuses){
      sts=data.statuses;
      gts=data.gates||{};
      updatePrdDisplay(data);
      renderUI();
    }
  }catch(e){console.error('refreshPrd:',e)}
}

function updatePrdDisplay(prd){
  const el=document.getElementById('prd-progress');
  const idEl=document.getElementById('prd-id');
  if(!prd||prd.done===undefined){
    el.textContent='';idEl.textContent='';
    document.title='Claude Pilot';
    return;
  }
  el.textContent=`${prd.done}/${prd.total}`;
  el.style.color=prd.done===prd.total?'var(--gr)':'var(--or)';
  el.style.borderColor=prd.done===prd.total?'var(--grd)':'var(--bd)';
  idEl.textContent=prd.id||activePrd||'';
  document.title=activePrd?`${activePrd} - Claude Pilot`:'Claude Pilot';
  if(prd.gates)gts=prd.gates;
}

/* Pipeline */
function renderPipe(){
  const el=document.getElementById('pipeline');el.innerHTML='';
  (W.steps||[]).forEach((step,i)=>{
    if(i>0){
      const c=document.createElement('div');c.className='cn';
      if(sts[W.steps[i-1].id]==='done')c.classList.add('d');
      el.appendChild(c);
    }
    const n=document.createElement('div');
    n.className='nd'+(selStep===step.id?' sel':'');
    n.setAttribute('data-s',sts[step.id]||'pending');
    const gate=gts[step.id]||'';
    n.innerHTML=`<div class="i"></div><div><div>${h(step.label)}</div>${gate?`<div class="gate" title="${h(gate)}">${h(gate)}</div>`:''}</div>`;
    n.onclick=()=>selStep===step.id?closeSp():openSp(step.id);
    el.appendChild(n);
  });
}

/* Suggest */
function openSp(id){
  selStep=id;
  const step=W.steps.find(s=>s.id===id);if(!step)return;
  document.getElementById('sp').classList.add('open');
  document.getElementById('sp-l').textContent=step.label;
  document.getElementById('sp-d').textContent=step.description||'';

  const skEl=document.getElementById('sp-sk');
  skEl.innerHTML='';

  // Show past revert reasons for this phase
  fetch('/api/phase/feedback-log').then(r=>r.json()).then(d=>{
    if(!d.log)return;
    const regex=new RegExp('## Revert to '+step.label+'[\\s\\S]*?(?=## Revert|$)','g');
    const matches=d.log.match(regex);
    if(matches&&matches.length>0){
      const warn=document.createElement('div');warn.className='sp-revert-history';
      warn.textContent='Past reverts ('+matches.length+'): '+matches[matches.length-1].split('**Reason:**')[1]?.trim().split('\n')[0]||'';
      skEl.prepend(warn);
    }
  }).catch(()=>{});

  // Render substeps as mini-pipeline if available
  const substeps=step.substeps||[];
  const ssStatuses=substepSts[step.id]||[];
  if(substeps.length>0){
    const container=document.createElement('div');
    container.className='substeps';
    substeps.forEach(ss=>{
      const ssStatus=ssStatuses.find(s=>s.id===ss.id);
      const status=ssStatus?.status||'unknown';
      const el=document.createElement('div');
      el.className='ss';
      el.setAttribute('data-s',status==='done'?'done':status==='active'?'active':'pending');
      const badge=(ss.type||'prompt')==='prompt'?'prompt':'bash';
      el.innerHTML=`<div class="ss-dot"></div><span class="ss-badge">${badge}</span><span class="ss-name">${h(ss.name)}</span><span class="ss-desc">${h(ss.desc||'')}</span>${ssStatus?.message?`<span class="ss-msg">${h(ssStatus.message)}</span>`:''}`;
      el.onclick=(e)=>showSkillDetail({name:ss.name,desc:ss.desc,type:ss.type},e,false);
      container.appendChild(el);
    });
    skEl.appendChild(container);
  } else {
    // Fallback: flat skill chips (legacy)
    (step.skills||[]).forEach(s=>{
      const cls=s.type==='prompt'?'sk prompt-type':'sk';
      skEl.appendChild(createSkillChip(s,cls));
    });
  }

/* Command execution */
async function runCommand(){
  const input=document.getElementById('cmd-i');
  const prompt=input.value.trim();
  dbg('runCommand',{prompt,cmuxMode});
  if(!prompt)return;
  input.value='';
  input.placeholder=cmuxMode?'command or prompt... (Enter to send to terminal)':'prompt...';

  // Handle /batch command: /batch /skill1 /skill2 /skill3
  if(prompt.startsWith('/batch ')){
    const parts=prompt.slice(7).trim().split(/\s+/);
    if(parts.length===0){appendOutput('Usage: /batch /skill1 /skill2 ...\n','err');return}
    appendOutput(`> Batch: ${parts.join(', ')}\n`,'tool');
    try{
      const res=await postJson('/api/batch',{skills:parts,mode:'parallel'});
      const data=await res.json();
      if(data.ok) appendOutput(`Batch started (${parts.length} skills)\n`,'done');
      else appendOutput(`Batch error: ${data.error}\n`,'err');
    }catch(e){appendOutput(`Network error: ${e.message}\n`,'err')}
    return;
  }

  if(cmuxMode){
    // Send to terminal via cmux
    try{
      dbg('cmux-send-request',{prompt});
      const res=await postJson('/api/cmux-send',{prompt});
      const data=await res.json();
      dbg('cmux-send-response',data);
      if(data.ok){
        appendOutput(`Sent to terminal: ${prompt}\n`,'done');
      }else{
        appendOutput(`Failed: ${data.error||data.message}\n`,'err');
      }
    }catch(e){
      dbg('cmux-send-error',{error:e.message});
      appendOutput(`Network error: ${e.message}\n`,'err');
    }
    return;
  }

  // Fallback: Agent SDK execution
  if(agentBusy)return;
  const out=document.getElementById('out');
  out.innerHTML='';
  out.classList.add('show');

  try{
    const res=await postJson('/api/run',{prompt});
    if(!res.ok){
      const err=await res.json();
      appendOutput(`Error: ${err.error}\n`,'err');
    }
  }catch(e){
    appendOutput(`Network error: ${e.message}\n`,'err');
  }
}

function appendOutput(text,cls){
  const out=document.getElementById('out');
  const el=document.createElement('span');
  el.className='chunk'+(cls?' '+cls:'');
  el.textContent=text;
  out.appendChild(el);
  out.scrollTop=out.scrollHeight;
}

document.getElementById('cmd-i').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey&&!e.isComposing)runCommand();
});

let eventFilter='all'; // 'all' | 'session' | 'pilot'
let currentSessionId=null; // Captured from first Hook event

function setEventFilter(f){
  eventFilter=f;

  document.getElementById('filter-'+f).classList.add('active');

  });
}

function shouldShowEvent(sessionId){
  if(eventFilter==='all')return true;
  if(eventFilter==='session')return sessionId===currentSessionId||sessionId==='default';
  if(eventFilter==='pilot')return sessionId==='default'||!sessionId;
  return true;
}

function addRow(ev,sessionId){
  // Track the first non-default session as "current session"
  if(!currentSessionId&&sessionId&&sessionId!=='default'){
    currentSessionId=sessionId;
  }
  const ls=document.getElementById('ls');
  const r=document.createElement('div');r.className='lr';
  r.dataset.sid=sessionId||'';
  if(!shouldShowEvent(sessionId))r.style.display='none';
  const t=new Date(ev.ts).toTimeString().slice(0,8);
  let hkCls='';
  if(ev.hookEvent==='Run')hkCls='run';
  else if(ev.hookEvent==='Error')hkCls='err';
  else if(ev.hookEvent==='Done')hkCls='done';
  else if(ev.hookEvent==='PRD')hkCls='prd';
  else if(['Read','Write','Edit','Bash','Glob','Grep'].includes(ev.hookEvent))hkCls='tool';
  else if(['PreToolUse','PostToolUse','SessionStart','Stop'].includes(ev.hookEvent))hkCls='tool';
  r.innerHTML=`<span class="ts">${t}</span><span class="hk ${hkCls}">${h(ev.hookEvent||'')}</span><span class="mg">${h(ev.summary||'')}</span>`;
  ls.insertBefore(r,ls.firstChild);
  ec++;document.getElementById('lc').textContent=ec;
  while(ls.children.length>250)ls.removeChild(ls.lastChild);
}

/* SSE */
let sseRetryDelay=1000;
function connectSSE(){
  const es=new EventSource('/api/sse');
  es.onmessage=e=>{
    try{
      const d=JSON.parse(e.data);

      if(d.type==='event') addRow(d.event,d.sessionId);

      if(d.type==='team_status'){
        document.getElementById('team-badge').classList.toggle('show',d.running);
        if(d.running) document.getElementById('team-badge').textContent=`TEAM ${(d.current||0)+1}/${d.total||0}`;
      }

      if(d.type==='autopilot_status'){autopilotState=d;updateAutopilotUI(d)}

      if(d.type==='live_activity'){
        // Token estimate in header could be shown
      }

      if(d.type==='step_update'){
        const newKey=JSON.stringify(d.statuses)+(d.gates?JSON.stringify(d.gates):'');
        if(newKey!==prevStsKey){
          prevStsKey=newKey;
          sts=d.statuses;
          if(d.gates)gts=d.gates;
          if(d.substepStatuses)substepSts=d.substepStatuses;
          if(d.suggestions)currentSuggestions=d.suggestions;
          renderUI();
          if(d.currentStepId&&d.currentStepId!==selStep)openSp(d.currentStepId);
        }
      }

      if(d.type==='workflow'){
        W=d.workflow;
        renderUI();
      }

      if(d.type==='prd_selected'){
        activePrd=d.prdId;
        prevStsKey='';
        document.getElementById('prd-select').value=d.prdId||'';
        if(d.statuses){
          sts=d.statuses;
          gts=d.gates||{};
          if(d.substepStatuses)substepSts=d.substepStatuses;
          if(d.suggestions)currentSuggestions=d.suggestions;
          updatePrdDisplay(d);
          renderUI();
        }
      }

      if(d.type==='agent_status'){
        agentBusy=d.running;
        document.getElementById('beacon').classList.toggle('busy',d.running);
        document.getElementById('agent-badge').classList.toggle('show',d.running);
        document.getElementById('cmd-i').disabled=d.running;
        document.getElementById('cmd-b').disabled=d.running;
      }

      if(d.type==='agent_text') appendOutput(d.text+'\n');
      if(d.type==='agent_tool') appendOutput(`[${d.tool}] ${d.summary}\n`,'tool');
      if(d.type==='agent_result') appendOutput(`\n-- Done --\n`,'done');
      if(d.type==='agent_error') appendOutput(`\nError: ${d.error}\n`,'err');
    }catch(err){console.error(err)}
  };
  es.onopen=async()=>{
    sseRetryDelay=1000;
    prevStsKey='';lastGlobalKey='';
    // Re-detect cmux on reconnect (server may have restarted)
    try{
      const ctx=await(await fetch('/api/cmux-context')).json();
      cmuxMode=ctx.available||false;
      dbg('sse-reconnect-cmux',{available:ctx.available,cmuxMode});
      updateCmuxUI();
    }catch{}
    loadPrds();
  };
  es.onerror=()=>{
    es.close();
    setTimeout(connectSSE,sseRetryDelay);
    sseRetryDelay=Math.min(sseRetryDelay*2,30000);
  };
}

function h(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
/* Command Palette */
let paletteOpen=false,paletteItems=[],paletteIdx=-1;

// Intent keywords for fuzzy matching natural language to skills
const INTENT_MAP=[
  {intents:['行き詰','stuck','困って','わからない'],skills:['WSP/ISP Classification','CTA Interview']},
  {intents:['振り返','retrospect','review','反省'],skills:['Retrospective','CTA Interview']},
  {intents:['品質','quality','レビュー','simplify'],skills:['/simplify','/code-review']},
  {intents:['設計','design','アーキ','architect'],skills:['CTA Interview','WSP/ISP Classification']},
  {intents:['テスト','test','バグ','bug','error'],skills:['/code-review','/simplify']},
  {intents:['新しい','new','始め','start'],skills:['WSP/ISP Classification']},
];

function buildPaletteItems(){
  const items=[];

  // 1. Recommended (from NEXT actions) — always at top
  if(currentSuggestions&&currentSuggestions.length>0){
    currentSuggestions.forEach(s=>{
      items.push({...s,phase:'★ Recommended',reason:s.reason||'',_isRecommended:true});
    });
  }

  // 2. Explore tools
  if(recommendations&&recommendations.explore){
    recommendations.explore.forEach(s=>{
      items.push({...s,phase:'Explore',_isExplore:true});
    });
  }

  // 3. Global skills
  const g=W.global||{};
  (g.categories||[]).forEach(cat=>{
    (cat.skills||[]).forEach(s=>{
      items.push({...s,phase:'Global: '+cat.name});
    });
  });
  // 4. Phase substeps
  (W.steps||[]).forEach(step=>{
    (step.substeps||[]).forEach(ss=>{
      items.push({name:ss.name,desc:ss.desc||'',type:ss.type||'prompt',phase:step.label});
    });
  });
  return items;
}

function intentMatch(query,items){
  const q=query.toLowerCase();
  // Check intent keywords
  const matchedSkills=new Set();
  INTENT_MAP.forEach(m=>{
    if(m.intents.some(i=>q.includes(i))){
      m.skills.forEach(s=>matchedSkills.add(s));
    }
  });
  if(matchedSkills.size>0){
    // Boost matched skills to top
    const boosted=items.filter(i=>matchedSkills.has(i.name));
    const rest=items.filter(i=>!matchedSkills.has(i.name)&&(
      i.name.toLowerCase().includes(q)||(i.desc||'').toLowerCase().includes(q)||(i.phase||'').toLowerCase().includes(q)
    ));
    return[...boosted,...rest];
  }
  // Normal fuzzy match
  return items.filter(i=>
    i.name.toLowerCase().includes(q)||(i.desc||'').toLowerCase().includes(q)||(i.phase||'').toLowerCase().includes(q)
  );
}

function openPalette(){
  paletteItems=buildPaletteItems();
  paletteOpen=true;paletteIdx=-1;
  document.getElementById('palette-overlay').classList.add('show');
  const input=document.getElementById('palette-input');
  input.value='';input.focus();
  renderPaletteList('');
}

function closePalette(){
  paletteOpen=false;
  document.getElementById('palette-overlay').classList.remove('show');
}

function renderPaletteList(query){
  const list=document.getElementById('palette-list');
  const filtered=query?intentMatch(query,paletteItems):paletteItems;
  if(filtered.length===0){list.innerHTML='<div class="palette-empty">No matching skills</div>';return}
  list.innerHTML='';
  filtered.slice(0,15).forEach((item,i)=>{
    const el=document.createElement('div');
    el.className='palette-item'+(i===paletteIdx?' sel':'')+(item._isRecommended?' recommended':'')+(item._isExplore?' explore':'');
    const badge=(item.type||'prompt')==='prompt'?'prompt':'bash';
    const reason=item.reason?'<span class="pi-reason">'+h(item.reason)+'</span>':'';
    el.innerHTML=`<span class="pi-badge">${badge}</span><span class="pi-name">${h(item.name)}</span><span class="pi-desc">${h(item.desc||'')}</span>${reason}<span class="pi-phase">${h(item.phase||'')}</span>`;
    el.onclick=()=>{closePalette();showSkillDetail(item,el,false)};
    list.appendChild(el);
  });
}

document.getElementById('palette-input').addEventListener('input',e=>renderPaletteList(e.target.value));
document.getElementById('palette-input').addEventListener('keydown',e=>{
  if(e.isComposing)return;
  const items=document.querySelectorAll('#palette-list .palette-item');
  if(e.key==='ArrowDown'){e.preventDefault();paletteIdx=Math.min(paletteIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('sel',i===paletteIdx))}
  else if(e.key==='ArrowUp'){e.preventDefault();paletteIdx=Math.max(paletteIdx-1,0);items.forEach((el,i)=>el.classList.toggle('sel',i===paletteIdx))}
  else if(e.key==='Enter'&&paletteIdx>=0&&items[paletteIdx]){items[paletteIdx].click()}
  else if(e.key==='Escape'){closePalette()}
});

let pluginPageSize=20;

function renderPluginList(plugins,reset){
  const el=document.getElementById('plugin-list');
  if(!el)return;
  if(reset)pluginShown=0;
  if(plugins.length===0){el.innerHTML='<div class="cfg-item"><span class="ci-val">No plugins found</span></div>';return}
  if(pluginShown===0)el.innerHTML='';
  const batch=plugins.slice(pluginShown,pluginShown+pluginPageSize);
  batch.forEach(p=>{
    const badge=p.isAnthropic?'<span class="pl-cat" style="color:var(--gn);border-color:var(--gn)">Official</span>':'';
    const action=p.installed?'<span class="pl-installed">installed</span>':`<button class="pl-install-btn" onclick="installPlugin('${h(p.name)}')">Install</button>`;
    const row=document.createElement('div');row.className='plugin-row';

    row.innerHTML=`<span class="pl-name">${h(p.name)}</span>${badge}<span class="pl-desc">${h(p.description)}</span><span class="pl-cat">${h(p.category)}</span>${action}`;
    el.appendChild(row);
  });
  pluginShown+=batch.length;
  // Remove old load-more button
  const oldBtn=el.querySelector('.pl-load-more');
  if(oldBtn)oldBtn.remove();
  // Add load-more if there are more
  const remaining=plugins.length-pluginShown;
  if(remaining>0){
    const btn=document.createElement('button');btn.className='pl-load-more';
    btn.textContent=`もっと見る (残り ${remaining}件)`;
    btn.onclick=()=>renderPluginList(plugins,false);
    el.appendChild(btn);
  }
}

}

async function installPlugin(name){
  if(!confirm(`Install plugin "${name}"?`))return;
  try{
    const data=await(await postJson('/api/plugins/install',{name,scope:'project'})).json();
    if(data.ok){alert('Installed. Restart session to activate.');loadConfig();}
    else alert('Error: '+data.error);
  }catch(e){alert('Error: '+e.message)}
}

async function loadAnalytics(){
  try{
    const data=await(await fetch('/api/analytics')).json();
    const el=document.getElementById('analytics-content');
    if(!el)return;
    let html='';

    // Usage analytics
    try{
      const usage=await(await fetch('/api/usage-analytics')).json();
      html+=`<div class="cfg-section"><div class="cfg-section-title">App Usage <span class="count">${usage.score}%</span></div>`;
      html+=`<div class="progress-bar"><div class="fill" style="width:${usage.score}%;background:${usage.score>60?'var(--gn)':usage.score>30?'var(--or)':'var(--r)'}"></div></div>`;
      html+=`<div style="font-size:9px;color:var(--txd);margin:4px 0">${usage.usedFeatures}/${usage.totalFeatures} features used</div>`;
      for(const [key,f] of Object.entries(usage.features||{})){
        const icon=f.status==='active'?'&#10003;':'&#10007;';
        const color=f.status==='active'?'var(--gn)':'var(--txd)';
        html+=`<div class="cfg-item"><span style="color:${color}">${icon}</span><span class="ci-name">${h(key)}</span><span class="ci-val">${f.count}x</span></div>`;
        if(f.status==='unused'){html+=`<div style="font-size:9px;color:var(--or);padding-left:20px;margin-bottom:4px">${h(f.suggestion)}</div>`}
      }
      html+=`</div>`;
    }catch{}

    // CLAUDE.md score
    const score=data.claudeMd?.score||0;
    const stars='*'.repeat(Math.round(score/20))+'_'.repeat(5-Math.round(score/20));
    html+=`<div class="cfg-section"><div class="cfg-section-title">CLAUDE.md Quality</div>`;
    html+=`<div class="score-bar"><span class="stars">${stars.replace(/\*/g,'&#9733;').replace(/_/g,'&#9734;')}</span><span class="ci-val">${score}/100</span></div>`;
    html+=`<div class="progress-bar"><div class="fill" style="width:${score}%"></div></div>`;
    (data.claudeMd?.issues||[]).forEach(i=>{html+=`<div class="cfg-item"><span class="ci-val">${h(i)}</span></div>`});
    html+=`</div>`;

    // PRD progress
    html+=`<div class="cfg-section"><div class="cfg-section-title">PRD Progress <span class="count">${data.totalPrds}</span></div>`;
    (data.prds||[]).slice(0,8).forEach(p=>{
      html+=`<div class="cfg-item"><span class="ci-name">${h(p.id)}</span><span class="ci-val">${p.done}/${p.total} (${p.progress}%)</span></div>`;
      html+=`<div class="progress-bar"><div class="fill" style="width:${p.progress}%"></div></div>`;
    });
    html+=`</div>`;

    // Hook stats
    const stats=data.hookStats||{};
    if(Object.keys(stats).length>0){
      html+=`<div class="cfg-section"><div class="cfg-section-title">Event Stats (this session)</div>`;
      for(const [event,count] of Object.entries(stats).sort((a,b)=>b[1]-a[1])){
        html+=`<div class="cfg-item"><span class="ci-name">${h(event)}</span><span class="ci-val">${count}</span></div>`;
      }
      html+=`</div>`;
    }

    el.innerHTML=html;
  }catch(e){console.error('loadAnalytics:',e)}
}

async function loadUnregisteredSkills(){
  try{
    const data=await(await fetch('/api/scaffold')).json();
    const container=document.getElementById('cfg-unregistered');
    if(!container)return;
    const items=data.unregistered||[];
    if(items.length===0){
      container.innerHTML=`<div class="cfg-section-title">Unregistered Skills <span class="count">0</span></div><div class="cfg-item"><span class="ci-val">All skills registered</span></div>`;
      return;
    }
    let html=`<div class="cfg-section-title">Unregistered Skills <span class="count">${items.length}</span></div>`;
    html+=`<div style="font-size:9px;color:var(--txd);margin-bottom:6px">.claude/ にあるが workflow.yml に未登録のスキル</div>`;
    items.slice(0,10).forEach(s=>{
      html+=`<div class="cfg-item"><span class="ci-name">${h(s.name)}</span><span class="ci-val" style="font-size:8px">${h(s.suggestedPhase)}</span></div>`;

function sendSkill(name){
  dbg('sendSkill',{name});
  document.getElementById('cmd-i').value=name;
  appendOutput(`> ${name}\n`,'tool');
  runCommand();
}

async function createTeamDialog(){
  const name=prompt('Team name:');if(!name)return;
  const skillsStr=prompt('Skills (comma separated, e.g. /simplify, /code-review):');if(!skillsStr)return;
  const skills=skillsStr.split(',').map(s=>s.trim()).filter(Boolean);
  const mode=confirm('Parallel execution? (OK=parallel, Cancel=sequential)')?'parallel':'sequential';
  try{
    const res=await postJson('/api/teams/create',{label:name,skills,mode});
    const data=await res.json();
    if(data.ok){appendOutput('Team created: '+name+'\n','done');renderGlobal()}
    else appendOutput('Error: '+data.error+'\n','err');
  }catch(e){appendOutput('Error: '+e.message+'\n','err')}
}

async function runTeam(teamId,label,desc){
  if(!confirm(`Team "${label}" を実行しますか?\n${desc||''}`))return;
  try{
    const res=await postJson('/api/team/run',{teamId});
    const data=await res.json();
    if(data.ok){
      appendOutput(`Team started: ${label}\n`,'done');
    }else{
      appendOutput(`Team error: ${data.error}\n`,'err');
    }
  }catch(e){
    appendOutput(`Network error: ${e.message}\n`,'err');
  }
}

/* Autopilot controls */
async function startAutopilot(){
  if(!activePrd){alert('PRDを選択してください');return}
  if(!confirm(`Autopilot を開始しますか?\nPRD: ${activePrd}\n\n全フェーズの substeps を自動実行します。`))return;
  try{
    const res=await postJson('/api/autopilot/start',{});
    const data=await res.json();
    if(!data.ok)alert(data.error);
  }catch(e){alert(e.message)}
}
async function pauseAutopilot(){
  await postJson('/api/autopilot/pause',{});
}
async function stopAutopilot(){
  if(!confirm('Autopilot を停止しますか?'))return;
  await postJson('/api/autopilot/stop',{});
}

function updateAutopilotUI(status){
  const bar=document.getElementById('autopilot-bar');
  const statusEl=document.getElementById('ap-status');
  const startBtn=document.getElementById('ap-start');
  const pauseBtn=document.getElementById('ap-pause');
  const stopBtn=document.getElementById('ap-stop');

  if(activePrd) bar.classList.add('show');
  else bar.classList.remove('show');

  if(status.running){
    startBtn.style.display='none';
    pauseBtn.style.display='';
    stopBtn.style.display='';
    pauseBtn.textContent=status.paused?'Resume':'Pause';
    const step=W.steps?.find(s=>s.id===status.currentStep);
    const ss=step?.substeps?.find(s=>s.id===status.currentSubstep);
    statusEl.textContent=status.paused?'Paused':`Running: ${step?.label||''} > ${ss?.name||''}`;
  }else{
    startBtn.style.display='';
    pauseBtn.style.display='none';
    stopBtn.style.display='none';
    statusEl.textContent='Ready';
  }
}

/* Prompt Library */
function openPromptDialog(defaultText){
  document.getElementById('prompt-dialog').classList.add('show');
  document.getElementById('prompt-text').value=defaultText||'';
  document.getElementById('prompt-name').value='';
  document.getElementById('prompt-desc').value='';
  document.getElementById('prompt-tags').value='';
  document.getElementById('prompt-name').focus();
}
function closePromptDialog(){
  document.getElementById('prompt-dialog').classList.remove('show');
}
async function savePrompt(){
  const name=document.getElementById('prompt-name').value.trim();
  const prompt=document.getElementById('prompt-text').value.trim();
  const description=document.getElementById('prompt-desc').value.trim();
  const tags=document.getElementById('prompt-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  if(!name||!prompt){alert('Name and prompt are required');return}
  try{
    const res=await postJson('/api/prompts/save',{name,prompt,description,tags});
    const data=await res.json();
    if(data.ok){closePromptDialog();loadPromptList()}
    else alert(data.error);
  }catch(e){alert(e.message)}
}

async function loadPromptList(){
  const el=document.getElementById('prompt-list');
  if(!el)return;
  try{
    const res=await fetch('/api/prompts');
    const data=await res.json();
    const prompts=data.prompts||[];
    if(prompts.length===0){el.innerHTML='<div style="color:var(--txd);font-size:11px">No saved prompts yet</div>';return}
    el.innerHTML=prompts.map(p=>`<div class="cfg-item" style="flex-wrap:wrap">
      <span class="ci-name" title="${h(p.prompt||'')}">${h(p.name||p.file)}</span>
      <span style="display:flex;gap:4px">
        <button class="cfg-action" onclick="runPrompt('${h(p.prompt||'')}')">Run</button>
        <button class="ap-btn" onclick="openPromptDialog('${h(p.prompt||'')}')">Edit</button>
      </span>
      ${p.description?`<div style="width:100%;font-size:10px;color:var(--txd);margin-top:2px">${h(p.description)}</div>`:''}
    </div>`).join('');
  }catch(e){el.innerHTML='<div style="color:var(--r)">'+h(e.message)+'</div>'}
}

async function runPrompt(text){
  if(!text)return;
  try{
    const res=await postJson('/api/prompts/run',{prompt:text});
    const data=await res.json();
    if(data.ok)addLog('Prompt sent');
    else addLog('Prompt failed: '+(data.error||'unknown'));
  }catch(e){addLog('Prompt error: '+e.message)}
}

/* Document Viewer (PRD Artifacts) */
let docSelectedPhase=null,docSelectedFile=null,docPollTimer=null;

async function loadDocPhases(){
  const container=document.getElementById('doc-phases');
  if(!container)return;
  if(!activePrd){container.textContent='Select a PRD first';return}
  // Load completeness indicator in parallel
  loadDocCompleteness();
  try{
    const data=await(await fetch('/api/prd/'+encodeURIComponent(activePrd)+'/phases')).json();
    const phases=data.phases||[];
    container.textContent='';
    // PRD root button
    const prdBtn=document.createElement('button');
    prdBtn.className='doc-phase-btn'+(docSelectedPhase==='_root'?' active':'');
    prdBtn.textContent='PRD';
    prdBtn.onclick=()=>selectDocPhase('_root');
    container.appendChild(prdBtn);
    phases.forEach(p=>{
      const btn=document.createElement('button');
      btn.className='doc-phase-btn'+(p.current?' current':'')+(docSelectedPhase===p.name?' active':'');
      btn.textContent=p.label;
      btn.title=p.name+' ('+p.status+')';
      btn.onclick=()=>selectDocPhase(p.name);
      container.appendChild(btn);
    });
    // Auto-select current phase if nothing selected
    if(!docSelectedPhase){
      const cur=phases.find(p=>p.current);
      if(cur)selectDocPhase(cur.name);
    }
  }catch(e){container.textContent='Error loading phases'}
}

async function loadDocCompleteness(){
  const el=document.getElementById('doc-completeness');
  if(!el||!activePrd)return;
  try{
    const data=await(await fetch('/api/prd/'+encodeURIComponent(activePrd)+'/completeness')).json();
    if(!data||data.taskType.id==='unknown'){
      el.textContent='';
      const badge=document.createElement('div');
      badge.className='completeness-badge unknown';
      badge.textContent='タスク種別: 不明 (task-types.yml にマッチするキーワードなし)';
      el.appendChild(badge);
      return;
    }
    const c=data.completeness;
    const pctClass=c.percentage>=80?'high':c.percentage>=50?'mid':'low';
    // Build header
    el.textContent='';
    const header=document.createElement('div');
    header.className='completeness-header';
    const badge=document.createElement('span');
    badge.className='completeness-badge '+pctClass;
    badge.textContent='タスク種別: '+data.taskType.label+' | 充足度: '+c.satisfied+'/'+c.total+' ('+c.percentage+'%)';
    header.appendChild(badge);
    const toggle=document.createElement('button');
    toggle.className='completeness-toggle';
    toggle.textContent='Details';
    toggle.onclick=function(){toggleCompletenessDetail()};
    header.appendChild(toggle);
    el.appendChild(header);
    // Build detail
    const detail=document.createElement('div');
    detail.className='completeness-detail';
    detail.id='completeness-detail';
    detail.style.display='none';
    const itemsDiv=document.createElement('div');
    itemsDiv.className='completeness-items';
    (c.items||[]).forEach(function(it){
      const row=document.createElement('div');
      row.className='completeness-item '+(it.found?'found':'missing');
      const icon=document.createElement('span');
      icon.className='ci-icon';
      icon.textContent=it.found?'\u2713':'\u2717';
      row.appendChild(icon);
      const text=document.createElement('span');
      text.className='ci-text';
      text.textContent=it.item;
      row.appendChild(text);
      const output=document.createElement('span');
      output.className='ci-output';
      output.textContent=it.output;
      row.appendChild(output);
      itemsDiv.appendChild(row);
    });
    detail.appendChild(itemsDiv);
    el.appendChild(detail);
  }catch(e){el.textContent=''}
}

function toggleCompletenessDetail(){
  const el=document.getElementById('completeness-detail');
  if(el)el.style.display=el.style.display==='none'?'block':'none';
}

async function selectDocPhase(phaseName){
  docSelectedPhase=phaseName;
  docSelectedFile=null;
  stopDocPoll();
  // Update active state on phase buttons
  const btns=document.querySelectorAll('.doc-phase-btn');
  btns.forEach(b=>b.classList.toggle('active',b.textContent==='PRD'?phaseName==='_root':b.title?.startsWith(phaseName+' ')));
  if(phaseName==='_root'){
    loadDocPrdContent();
    const filesEl=document.getElementById('doc-files');
    if(filesEl)filesEl.textContent='';
    return;
  }
  // Load files for this phase
  try{
    const data=await(await fetch('/api/prd/'+encodeURIComponent(activePrd)+'/phases')).json();
    const phase=(data.phases||[]).find(p=>p.name===phaseName);
    const filesEl=document.getElementById('doc-files');
    if(!filesEl)return;
    filesEl.textContent='';
    if(!phase||phase.files.length===0){
      filesEl.textContent='No files in this phase';
      const contentEl=document.getElementById('doc-content');
      if(contentEl){const pre=document.createElement('pre');pre.className='doc-pre';pre.textContent='No artifacts yet';contentEl.textContent='';contentEl.appendChild(pre)}
      return;
    }
    phase.files.forEach(f=>{
      const btn=document.createElement('button');
      btn.className='doc-file-btn';
      btn.textContent=f;
      btn.onclick=()=>loadDocArtifact(phaseName,f);
      filesEl.appendChild(btn);
    });
    // Auto-select first file
    if(phase.files.length>0)loadDocArtifact(phaseName,phase.files[0]);
  }catch(e){
    const filesEl=document.getElementById('doc-files');
    if(filesEl)filesEl.textContent='Error loading files';
  }
}

async function loadDocPrdContent(){
  const contentEl=document.getElementById('doc-content');
  if(!contentEl||!activePrd)return;
  try{
    const data=await(await fetch('/api/prd/'+encodeURIComponent(activePrd)+'/content')).json();
    const pre=document.createElement('pre');
    pre.className='doc-pre';
    pre.textContent=data.content||'(empty)';
    contentEl.textContent='';
    contentEl.appendChild(pre);
  }catch(e){
    const pre=document.createElement('pre');
    pre.className='doc-pre';
    pre.textContent='No PRD document found';
    contentEl.textContent='';
    contentEl.appendChild(pre);
  }
}

async function loadDocArtifact(phase,file){
  docSelectedFile={phase,file};
  // Highlight active file button
  document.querySelectorAll('.doc-file-btn').forEach(b=>b.classList.toggle('active',b.textContent===file));
  const contentEl=document.getElementById('doc-content');
  if(!contentEl||!activePrd)return;
  try{
    const url='/api/prd/'+encodeURIComponent(activePrd)+'/artifact?phase='+encodeURIComponent(phase)+'&file='+encodeURIComponent(file);
    const data=await(await fetch(url)).json();
    const pre=document.createElement('pre');
    pre.className='doc-pre';
    pre.textContent=data.content||'(empty)';
    contentEl.textContent='';
    contentEl.appendChild(pre);
    // Start auto-reload polling
    startDocPoll(phase,file);
  }catch(e){
    const pre=document.createElement('pre');
    pre.className='doc-pre';
    pre.textContent='Error loading file: '+e.message;
    contentEl.textContent='';
    contentEl.appendChild(pre);
  }
}

function startDocPoll(phase,file){
  stopDocPoll();
  docPollTimer=setInterval(async()=>{
    if(!docSelectedFile||docSelectedFile.phase!==phase||docSelectedFile.file!==file)return stopDocPoll();
    try{
      const url='/api/prd/'+encodeURIComponent(activePrd)+'/artifact?phase='+encodeURIComponent(phase)+'&file='+encodeURIComponent(file);
      const data=await(await fetch(url)).json();
      const contentEl=document.getElementById('doc-content');
      if(!contentEl)return;
      const pre=contentEl.querySelector('.doc-pre');
      if(pre&&pre.textContent!==data.content)pre.textContent=data.content||'(empty)';
    }catch{}
  },5000);
}

function stopDocPoll(){
  if(docPollTimer){clearInterval(docPollTimer);docPollTimer=null}
}

/* Keyboard shortcuts */
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();paletteOpen?closePalette():openPalette()}
  if(e.key==='Escape'){
    if(paletteOpen)closePalette();
    else{closeSp();closeSkillDetail()}
  }
});

/* Konami code: ↑↑↓↓←→←→BA → toggle retro mode */
(function(){
  const seq=['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
  let pos=0;
  document.addEventListener('keydown',e=>{
    if(e.key===seq[pos]){pos++;if(pos===seq.length){document.body.classList.toggle('retro');pos=0}}
    else{pos=e.key===seq[0]?1:0}
  });
})();
